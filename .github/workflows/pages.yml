name: Deploy travel-guide to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment artifact
        run: |
          mkdir _site
          cp -r travel-guide/* _site/
          # Root redirect to the app
          cat > _site/../index_redirect.html <<'EOF'
          <!doctype html><meta http-equiv="refresh" content="0;url=./travel-guide/">
          EOF
          # Provide a friendly index at site root (in case people land there)
          cat > _site/_index_root.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <title>WEDPLANING</title>
          <meta http-equiv="refresh" content="0;url=./">
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
